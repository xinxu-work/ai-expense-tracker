name: 'expense_tracker'
version: '1.0.0'
config-version: 2

profile: 'expense_tracker'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Personal reporting follows confirmed salary dates by default. A calendar-
# month deployment can override this with: --vars '{period_mode: calendar}'
vars:
  period_mode: payday

models:
  expense_tracker:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
