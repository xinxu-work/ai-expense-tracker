version: 2

models:
  - name: fct_monthly_summary
    description: "Monthly aggregated transactions by category with YTD running totals"
    columns:
      - name: fiscal_month
        description: "Fiscal month in YYYY-MM format (14th–13th cycle)"
        tests:
          - not_null
      - name: category_name
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null

  - name: fct_savings_rate
    description: "Monthly income vs expenses vs savings with savings rate percentages and 3-month rolling averages"
    columns:
      - name: fiscal_month
        description: "Fiscal month in YYYY-MM format (14th–13th cycle)"
        tests:
          - unique
          - not_null

  - name: fct_budget_vs_actual
    description: "Category budget versus actual spending for the selected payday or calendar reporting period"
    columns:
      - name: fiscal_month
        tests:
          - not_null
      - name: budget_status
        tests:
          - accepted_values:
              arguments:
                values: ['over_budget', 'near_budget', 'within_budget']

  - name: fct_expense_group_summary
    description: "Fixed and variable living expenses versus budget for the selected reporting period"
    columns:
      - name: fiscal_month
        tests:
          - not_null
      - name: expense_group
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['fixed', 'variable']

  - name: fct_pay_period_summary
    description: "Transactions aggregated by confirmed salary period; supports an optional calendar-month mode"
    columns:
      - name: period_label
        tests:
          - not_null
      - name: period_start_date
        tests:
          - not_null
      - name: period_end_date
        tests:
          - not_null
      - name: period_basis
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['payday', 'calendar', 'calendar_fallback']
      - name: category_name
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
